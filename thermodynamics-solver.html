
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Spark Lab | Advanced Engine</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --accent: #00ffd5; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        
        /* VISIBILITY FIX: Ensures input text is white and readable */
        .form-control {
            background: #0f172a !important;
            color: #ffffff !important; 
            border: 1px solid #334155 !important;
            margin-bottom: 10px;
        }
        .form-control::placeholder { color: #64748b; }
        .form-label { color: var(--accent); font-weight: bold; font-size: 0.9rem; }

        .btn-analyze {
            background: linear-gradient(45deg, #007bff, var(--accent));
            border: none; color: #0f172a; font-weight: 800;
            padding: 12px; width: 100%; border-radius: 8px;
        }

        .results {
            margin-top: 20px; display: none;
            padding: 15px; border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent);
        }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
    </style>
</head>
<body>

<div style="max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px;">
    <h3 style="text-align: center; color: var(--accent);">Ultra Thermodynamics Solver</h3>
    
    <label class="form-label">Moles (n)</label>
    <input type="number" id="n" class="form-control" value="1">
    
    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label class="form-label">T₁ (K)</label>
            <input type="number" id="t1" class="form-control" value="298">
        </div>
        <div style="flex: 1;">
            <label class="form-label">T₂ (K)</label>
            <input type="number" id="t2" class="form-control" value="400">
        </div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label class="form-label">V₁ (L)</label>
            <input type="number" id="v1" class="form-control" value="22.4">
        </div>
        <div style="flex: 1;">
            <label class="form-label">V₂ (L)</label>
            <input type="number" id="v2" class="form-control" value="44.8">
        </div>
    </div>

    <label class="form-label">Polytropic Index (x)</label>
    <input type="number" id="poly_x" class="form-control" value="1.4">

    <label class="form-label">Cᵥ Const (a) & Slope (b)</label>
    <div style="display: flex; gap: 10px;">
        <input type="number" id="cv_a" class="form-control" value="12.47">
        <input type="number" id="cv_b" class="form-control" value="0">
    </div>

    <button id="analyze-btn" class="btn-analyze">ANALYZE PROCESS</button>

    <div id="result-area" class="results">
        <div class="res-item"><span>Internal Energy (ΔU):</span> <b id="res_u"></b></div>
        <div class="res-item"><span>Work Done (W):</span> <b id="res_w"></b></div>
        <div class="res-item"><span>Enthalpy (ΔH):</span> <b id="res_h"></b></div>
        <div class="res-item"><span>Entropy Change (ΔS):</span> <b id="res_s"></b></div>
        <div class="res-item"><span>Free Energy (ΔG):</span> <b id="res_g"></b></div>
        <div class="res-item"><span>Result:</span> <b id="res_spont" style="color: var(--accent);"></b></div>
    </div>
</div>

<script src="js/thermodynamics-solver.js"></script>
</body>
</html>
