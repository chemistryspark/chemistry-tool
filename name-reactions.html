
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Mechanisms | Chemistry Spark Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent-cyan: #00ffd5; --bg-dark: #0f172a; }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; }
        
        .mech-display {
            background: white;
            border-radius: 20px;
            padding: 40px;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--accent-cyan);
            margin-bottom: 20px;
        }

        .step-description {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-cyan);
            padding: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .arrow-btn {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            font-weight: bold;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
        }

        .chem-svg { width: 100%; max-width: 600px; height: auto; }
    </style>
</head>
<body>

<div class="container py-5">
    <h1 class="text-center mb-5">Advanced Mechanism Explorer</h1>
    
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div id="mechanism-viewer">
                <div class="mech-display" id="svg-container">
                    </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <button class="arrow-btn" onclick="prevStep()">← Previous Step</button>
                    <h4 id="step-counter">Step 1 of 3</h4>
                    <button class="arrow-btn" onclick="nextStep()">Next Step →</button>
                </div>

                <div class="step-description">
                    <h5 class="text-info">What is happening:</h5>
                    <p id="step-text">Base abstracts the alpha-hydrogen to form a resonance-stabilized enolate ion.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Example: High-Detail Aldol Mechanism Data
    const reactionData = {
        name: "Aldol Condensation",
        steps: [
            {
                text: "<strong>Formation of Enolate:</strong> The Hydroxide base (OH⁻) attacks the acidic α-hydrogen. The C-H bond breaks, and the electron pair moves to the Carbon, forming a carbanion stabilized by resonance with the Oxygen (Enolate).",
                svg: `<svg viewBox="0 0 500 150" class="chem-svg">
                        <text x="50" y="80" font-family="Arial" font-size="20" fill="black">CH2-CHO</text>
                        <text x="55" y="50" font-family="Arial" font-size="18" fill="red">H</text>
                        <text x="10" y="50" font-family="Arial" font-size="20" fill="blue">OH⁻</text>
                        <path d="M 30 50 Q 45 30 55 45" stroke="red" stroke-width="2" fill="none" marker-end="url(#head)" />
                        <path d="M 60 55 Q 70 70 65 75" stroke="red" stroke-width="2" fill="none" marker-end="url(#head)" />
                        <defs><marker id="head" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="red"/></marker></defs>
                      </svg>`
            },
            {
                text: "<strong>Nucleophilic Attack:</strong> The nucleophilic enolate carbon attacks the electrophilic carbonyl carbon of a second aldehyde molecule. The C=O pi bond breaks, moving electrons to the Oxygen.",
                svg: `<svg viewBox="0 0 500 150" class="chem-svg">
                        <text x="50" y="80" font-family="Arial" font-size="20" fill="black">[CH2-CHO]⁻</text>
                        <text x="200" y="80" font-family="Arial" font-size="20" fill="black">CH3-CHO</text>
                        <path d="M 120 80 Q 160 100 200 85" stroke="red" stroke-width="2" fill="none" marker-end="url(#head)" />
                      </svg>`
            },
            {
                text: "<strong>Protonation:</strong> The negatively charged Alkoxide oxygen abstracts a proton from water to form the final β-hydroxy aldehyde (Aldol) and regenerate the catalyst.",
                svg: `<svg viewBox="0 0 500 150" class="chem-svg">
                        <text x="50" y="80" font-family="Arial" font-size="20" fill="black">CH3-CH(O⁻)-CH2-CHO</text>
                        <text x="300" y="80" font-family="Arial" font-size="20" fill="blue">H-OH</text>
                        <path d="M 150 60 Q 220 30 295 70" stroke="red" stroke-width="2" fill="none" marker-end="url(#head)" />
                      </svg>`
            }
        ]
    };

    let currentStep = 0;

    function updateDisplay() {
        const step = reactionData.steps[currentStep];
        document.getElementById('svg-container').innerHTML = step.svg;
        document.getElementById('step-text').innerHTML = step.text;
        document.getElementById('step-counter').innerText = `Step ${currentStep + 1} of ${reactionData.steps.length}`;
    }

    function nextStep() {
        if (currentStep < reactionData.steps.length - 1) {
            currentStep++;
            updateDisplay();
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            currentStep--;
            updateDisplay();
        }
    }

    updateDisplay();
</script>
</body>
</html>
