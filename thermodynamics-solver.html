
<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Thermodynamics Solver - ChemistrySpark</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 
 body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 min-height: 100vh;
 padding: 20px;
 }
 
 .container {
 max-width: 1200px;
 margin: 0 auto;
 background: white;
 border-radius: 15px;
 box-shadow: 0 20px 40px rgba(0,0,0,0.1);
 overflow: hidden;
 }
 
 header {
 background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
 color: white;
 padding: 30px;
 text-align: center;
 }
 
 header h1 {
 font-size: 2.5em;
 margin-bottom: 10px;
 }
 
 header p {
 font-size: 1.1em;
 opacity: 0.9;
 }
 
 .nav-tabs {
 display: flex;
 background: #f8f9fa;
 border-bottom: 2px solid #dee2e6;
 overflow-x: auto;
 }
 
 .nav-tab {
 padding: 15px 30px;
 background: none;
 border: none;
 cursor: pointer;
 font-size: 1em;
 color: #6c757d;
 border-bottom: 3px solid transparent;
 transition: all 0.3s;
 }
 
 .nav-tab.active {
 color: #ff6b6b;
 border-bottom-color: #ff6b6b;
 }
 
 .nav-tab:hover:not(.active) {
 background: #e9ecef;
 }
 
 .tab-content {
 display: none;
 padding: 30px;
 }
 
 .tab-content.active {
 display: block;
 }
 
 .input-group {
 margin-bottom: 20px;
 }
 
 .input-group label {
 display: block;
 margin-bottom: 5px;
 font-weight: 500;
 color: #495057;
 }
 
 .input-group input, .input-group select {
 width: 100%;
 padding: 10px;
 border: 2px solid #ced4da;
 border-radius: 5px;
 font-size: 1em;
 transition: border-color 0.3s;
 }
 
 .input-group input:focus, .input-group select:focus {
 outline: none;
 border-color: #ff6b6b;
 }
 
 button {
 background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
 color: white;
 border: none;
 padding: 12px 30px;
 border-radius: 5px;
 cursor: pointer;
 font-size: 1em;
 transition: transform 0.3s, box-shadow 0.3s;
 }
 
 button:hover {
 transform: translateY(-2px);
 box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
 }
