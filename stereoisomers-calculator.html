
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StereoMaster | Chemistry Spark Lab</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);
            --accent-cyan: #00ffd5;
            --accent-blue: #007bff;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-top: 50px;
        }

        .calc-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-box {
            background: #1e293b !important;
            border: 2px solid var(--accent-blue) !important;
            color: white !important;
            font-weight: 600;
        }

        .form-label { color: var(--accent-cyan); font-weight: 700; margin-top: 10px; }
        
        .form-control {
            background-color: #1e293b !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white !important;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-cyan);
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .btn-lookup {
            background: var(--accent-blue);
            color: white;
            font-weight: 700;
            border: none;
        }

        .btn-calc {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            border: none; font-weight: 800; color: #0f172a;
            padding: 14px; border-radius: 12px; width: 100%;
        }

        .loading-spinner { display: none; width: 1.5rem; height: 1.5rem; }
    </style>
</head>
<body>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="calc-card">
                    <h4 class="text-center text-white mb-3">Auto-Fill by Molecule Name</h4>
                    <div class="input-group mb-3">
                        <input type="text" id="mol_name" class="form-control search-box" placeholder="e.g., Glucose, Tartaric acid, Butene...">
                        <button class="btn btn-lookup" type="button" onclick="lookupMolecule()">
                            <span id="btn-text">Search</span>
                            <div id="spinner" class="spinner-border loading-spinner" role="status"></div>
                        </button>
                    </div>
                    <small class="text-info" id="search-msg"></small>
                </div>

                <div class="calc-card">
                    <h2 class="h3 text-center mb-4 text-white">Isomer Calculator</h2>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Chiral Centers ($n$)</label>
                            <input type="number" id="n_val" class="form-control" value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Double Bonds ($m$)</label>
                            <input type="number" id="m_val" class="form-control" value="0">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Molecular Symmetry</label>
                            <select id="sym_type" class="form-select bg-dark text-white border-secondary">
                                <option value="unsym">Unsymmetric (Ends different)</option>
                                <option value="sym_even">Symmetric - Even Centers</option>
                                <option value="sym_odd">Symmetric - Odd Centers</option>
                            </select>
                        </div>
                        <div class="col-12 mt-4">
                            <button onclick="calculateIsomers()" class="btn btn-calc">Calculate Now</button>
                        </div>
                    </div>

                    <div id="result-area" class="result-box mt-4">
                        <div class="row text-center gy-3">
                            <div class="col-4">
                                <div class="text-cyan small fw-bold">Active</div>
                                <div id="res_active" class="h2 fw-bold text-white">0</div>
                            </div>
                            <div class="col-4">
                                <div class="text-cyan small fw-bold">Meso</div>
                                <div id="res_meso" class="h2 fw-bold text-white">0</div>
                            </div>
                            <div class="col-4">
                                <div class="text-cyan small fw-bold">Total</div>
                                <div id="res_total" class="h2 fw-bold text-white">0</div>
                            </div>
                        </div>
                        <p class="small text-white mt-3 mb-0 text-center" id="res_desc"></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function lookupMolecule() {
            const name = document.getElementById('mol_name').value;
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const msg = document.getElementById('search-msg');

            if (!name) return;

            // Start Loading
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            msg.innerText = "Searching PubChem Database...";

            try {
                // 1. Get CID from Name
                const cidRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${name}/cids/JSON`);
                const cidData = await cidRes.json();
                
                if (!cidData.IdentifierList) throw new Error("Molecule not found");
                const cid = cidData.IdentifierList.CID[0];

                // 2. Get Properties (IsomericSMILES)
                const propRes = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/property/IsomericSMILES/JSON`);
                const propData = await propRes.json();
                const smiles = propData.PropertyTable.Properties[0].IsomericSMILES;

                // 3. Analyze SMILES for Chiral Centers (@ symbols) and Double Bonds (=)
                // Simple heuristic counting for educational purposes
                const chiralCount = (smiles.match(/@/g) || []).length;
                const doubleBonds = (smiles.match(/=/g) || []).length;

                document.getElementById('n_val').value = chiralCount;
                document.getElementById('m_val').value = doubleBonds;
                
                msg.innerHTML = `✅ Found <b>${name}</b>! Chiral Centers: ${chiralCount}, Double Bonds: ${doubleBonds}. (Verify symmetry manually below)`;
                msg.classList.replace('text-info', 'text-success');

            } catch (err) {
                msg.innerText = "❌ Error: Molecule not found in database.";
                msg.classList.replace('text-info', 'text-danger');
            } finally {
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        function calculateIsomers() {
            const n = parseInt(document.getElementById('n_val').value) || 0;
            const m = parseInt(document.getElementById('m_val').value) || 0;
            const sym = document.getElementById('sym_type').value;
            
            let active = 0, meso = 0;
            let gi_factor = Math.pow(2, m);

            if (sym === "unsym") {
                active = Math.pow(2, n);
                meso = 0;
            } else if (sym === "sym_even") {
                active = Math.pow(2, n - 1);
                meso = Math.pow(2, (n / 2) - 1);
            } else if (sym === "sym_odd") {
                meso = Math.round(Math.pow(2, (n - 1) / 2));
                active = Math.round(Math.pow(2, n - 1) - meso);
            }

            const totalStereo = Math.round((active + meso) * gi_factor);

            document.getElementById('res_active').innerText = active;
            document.getElementById('res_meso').innerText = meso;
            document.getElementById('res_total').innerText = totalStereo;
            document.getElementById('res_desc').innerText = `Total results for n=${n}, m=${m}.`;
            document.getElementById('result-area').style.display = 'block';
        }
    </script>
</body>
</html>
