function render() {
    const grid = document.getElementById('reactionGrid');
    grid.innerHTML = reactions.map((r, i) => `
        <div class="col-md-4">
            <div class="reaction-card p-4" onclick="openModal(${i})">
                <span class="badge bg-primary badge-level mb-2">${r.level}</span>
                <h4 class="mb-2 text-info">${r.name}</h4>
                <div class="small text-muted mb-3">${r.tags.join(' • ')}</div>
                <button class="btn btn-sm btn-outline-light w-100">View Mechanism</button>
            </div>
        </div>
    `).join('');
}

function openModal(index) {
    const r = reactions[index];
    document.getElementById('mName').innerText = r.name;
    document.getElementById('mContent').innerHTML = `
        <div class="key-point"><strong>Exam Tip:</strong> ${r.keyPoints}</div>
        <h6 class="mt-4 text-cyan">Mechanism Visual:</h6>
        ${r.svg}
        <p class="mt-3 small text-muted">Each step involves electronic movement (curved arrows). Focus on the Rate Determining Step (RDS) for competitive exams.</p>
    `;
    new bootstrap.Modal(document.getElementById('mechModal')).show();
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const cards = document.querySelectorAll('.col-md-4');
    cards.forEach(card => {
        const name = card.querySelector('h4').innerText.toLowerCase();
        card.style.display = name.includes(term) ? 'block' : 'none';
    });
});

render();
